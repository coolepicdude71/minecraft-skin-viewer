<!DOCTYPE html>
<html>
<head>
<title>Minecraft Skin Viewer</title>

<style>

body{
background:#1b1b1b;
color:white;
font-family:Arial;
text-align:center;
margin-top:60px;
}

input{
padding:10px;
font-size:16px;
}

img{
margin-top:30px;
height:300px;
image-rendering: pixelated;
}

</style>

</head>

<body>

<h1>Minecraft Skin Viewer</h1>

<input id="username" placeholder="Enter username">

<br>

<button onclick="showSkin()">Show Skin</button>

<br>

<img id="skin">

<script>

function showSkin(){

let username = document.getElementById("username").value

let url = "https://mc-heads.net/body/" + username

document.getElementById("skin").src = url

}

</script>

</body>
</html>
