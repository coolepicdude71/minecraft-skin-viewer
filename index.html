
<!DOCTYPE html>
<html>
<head>
<title>Minecraft Skin Viewer</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#1b1b1b;
    color:white;
    margin-top:60px;
}

input{
    padding:10px;
    font-size:16px;
}

img{
    margin-top:30px;
    height:300px;
}
</style>

</head>

<body>

<h1>Minecraft Skin Viewer</h1>

<input id="username" placeholder="Enter username" oninput="showSkin()">

<br>

<img id="skin">

<script>

function showSkin(){

const username = document.getElementById("username").value;

const url = `https://crafatar.com/renders/body/${username}`;

document.getElementById("skin").src = url;

}

</script>

</body>
</html>
